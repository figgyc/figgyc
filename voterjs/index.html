<!DOCTYPE html>
<html>
    <head>
        <!--<meta http-equiv="refresh" content="0;URL='https://voter.figgyc.uk/'" />-->
    </head>
    <body>
        Voter.js has <a href="https://voter.figgyc.uk">moved.</a> Eventually this will redirect but for now if you want to save your data then copy the content of the box and paste it into the new version.
        <textarea></textarea>
        <script async defer>
            let output = {}
            output.savestates = JSON.parse(localStorage.savestates)
            output.saves = {}
            for (let name of output.savestates) {
                output.saves[name] = JSON.parse(localStorage.getItem(name))
            }
            document.querySelector("textarea").innerText = JSON.stringify(output)
        </script>
    </body>
</html>
